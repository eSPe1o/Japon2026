const keys=Object.keys(DATA).sort();let selected=0;
const esc=s=>String(s||'').replace(/</g,'&lt;').replace(/>/g,'&gt;');
function regionShort(r){return r==='takayama_kanazawa'?'Alpes':REGIONS[r].label.split(' ')[0]}
function dayIndexForToday(){const now=new Date(),k=`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`;const i=keys.indexOf(k);if(i>=0)return i;if(now<new Date(keys[0]+'T00:00:00'))return 0;return keys.length-1}
function renderStrip(){const el=document.getElementById('dayStrip');el.innerHTML=keys.map((k,i)=>{const d=new Date(k+'T12:00:00'),x=DATA[k];return `<button class="day-chip ${i===selected?'active':''}" data-i="${i}"><div class="dow">${d.toLocaleDateString('es-ES',{weekday:'short'}).replace('.','')}</div><div class="num">${d.getDate()}</div><div class="city">${regionShort(x.region)}</div></button>`}).join('');el.querySelectorAll('button').forEach(b=>b.onclick=()=>select(+b.dataset.i));requestAnimationFrame(()=>el.querySelector('.active')?.scrollIntoView({behavior:'smooth',inline:'center',block:'nearest'}))}
function infoBox(title,items){return `<div class="info-box"><h3>${title}</h3>${items?.length?`<ul>${items.map(x=>`<li>${x}</li>`).join('')}</ul>`:'<div class="empty">Sin información adicional</div>'}</div>`}
function renderCard(){const k=keys[selected],d=DATA[k],date=new Date(k+'T12:00:00'),r=REGIONS[d.region],map=MAPS[d.region];const card=document.getElementById('dayCard');card.style.setProperty('--accent',r.color);card.innerHTML=`<header class="day-head"><div class="region-dot">${r.label}</div><div class="day-date">Día ${selected+1} · ${date.toLocaleDateString('es-ES',{weekday:'long',day:'numeric',month:'long',year:'numeric'})}</div><h2 class="day-title">${d.title}</h2></header><div class="quick-actions"><button class="action" id="shareDay">↗ Compartir</button><button class="action" id="openMap" ${map?'':'disabled'}>⌖ Mapa</button><button class="action" id="topBtn">↑ Arriba</button></div><section class="section"><h2>⏱ Horario completo</h2>${d.horario?.length?`<ol class="timeline">${d.horario.map(x=>`<li>${x}</li>`).join('')}</ol>`:'<div class="empty">Horario pendiente</div>'}</section><section class="section"><h2>Información del día</h2><div class="info-grid">${infoBox('Transporte',d.transporte)}${infoBox('Alojamiento',d.alojamiento)}${infoBox('Comidas',d.comida)}${infoBox('Qué ver',d.ver)}${infoBox('Restaurantes',d.restaurantes)}${infoBox('Ruta',d.ruta)}</div></section>${map?`<section class="section"><h2>🗺 Mapa de la zona</h2></section><div class="map-wrap"><iframe loading="lazy" src="${map.embed}" referrerpolicy="no-referrer-when-downgrade"></iframe><a class="map-link" target="_blank" rel="noopener" href="${map.view}">Abrir mapa completo en Google Maps ↗</a></div>`:''}`;document.getElementById('shareDay').onclick=share;document.getElementById('openMap').onclick=()=>map&&window.open(map.view,'_blank');document.getElementById('topBtn').onclick=()=>window.scrollTo({top:0,behavior:'smooth'});document.getElementById('prev').disabled=selected===0;document.getElementById('next').disabled=selected===keys.length-1}
function select(i){selected=Math.max(0,Math.min(keys.length-1,i));renderStrip();renderCard();history.replaceState(null,'',`#${keys[selected]}`);window.scrollTo({top:document.querySelector('.day-strip').offsetTop-80,behavior:'smooth'})}
async function share(){const d=DATA[keys[selected]],payload={title:`Japón 2026 · ${d.title}`,text:`Día ${selected+1}: ${d.title}`,url:location.href};try{if(navigator.share)await navigator.share(payload);else{await navigator.clipboard.writeText(location.href);toast('Enlace copiado')}}catch(e){}}

document.getElementById('prev').onclick=()=>select(selected-1);document.getElementById('next').onclick=()=>select(selected+1);document.getElementById('today').onclick=()=>select(dayIndexForToday());document.getElementById('shareTop').onclick=share;
const hash=location.hash.slice(1);selected=Math.max(0,keys.indexOf(hash));if(!hash)selected=dayIndexForToday();renderStrip();renderCard();
